<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Dupla Sena 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#A61324" />

  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f0f0f0;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 600px;
    }

    h1 {
      color: #333;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 5px;
      margin-bottom: 20px;
    }

    .grid-item {
      aspect-ratio: 1 / 1;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid #ccc;
      cursor: pointer;
      border-radius: 5px;
      user-select: none;
      font-size: 0.9em;
    }

    .grid-item.selected {
      background-color: #A61324;
      color: white;
      border-color: #A61324;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      color: white;
      border-radius: 5px;
      margin-top: 5px;
    }

    .btn-check {
      background-color: #007bff;
    }

    .btn-clear {
      background-color: #dc3545;
    }

    #result {
      margin-top: 20px;
      font-size: 16px;
      text-align: left;
      line-height: 1.6;
    }

    #result h3 {
      margin-top: 20px;
      margin-bottom: 10px;
      color: #A61324;
      border-bottom: 2px solid #A61324;
      padding-bottom: 5px;
    }

    .sorteio-section {
      margin-bottom: 30px;
    }

    .result-list {
      max-height: 120px;
      overflow-y: auto;
      background-color: #f9f9f9;
      padding: 5px;
      border: 1px solid #eee;
      border-radius: 5px;
      font-size: 0.9em;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Dupla Sena - Simulador</h1>

    <div id="number-grid" class="grid-container"></div>

    <p>Números selecionados: <span id="selected-count">0</span> de 15</p>

    <div class="button-container">
      <button class="btn-check" onclick="checkResults()">Verificar Resultado</button>
      <button class="btn-clear" onclick="clearSelection()">Limpar Seleção</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const numberGrid = document.getElementById("number-grid");
    const selectedCountSpan = document.getElementById("selected-count");
    const resultDiv = document.getElementById("result");

    let selectedNumbers = [];
    const allGridItems = [];

    // Dupla Sena vai até 50
    for (let i = 1; i <= 50; i++) {
      const item = document.createElement("div");
      item.className = "grid-item";
      item.textContent = i.toString().padStart(2, "0");
      item.dataset.number = i;

      item.addEventListener("click", () => toggleNumber(item));
      numberGrid.appendChild(item);
      allGridItems.push(item);
    }

    function toggleNumber(el) {
      const num = parseInt(el.dataset.number);
      const idx = selectedNumbers.indexOf(num);

      if (idx >= 0) {
        selectedNumbers.splice(idx, 1);
        el.classList.remove("selected");
      } else {
        // Limite da Dupla Sena é de 15 dezenas
        if (selectedNumbers.length >= 15) {
          alert("Pode selecionar no máximo 15 números para a Dupla Sena.");
          return;
        }
        selectedNumbers.push(num);
        el.classList.add("selected");
      }

      selectedCountSpan.textContent = selectedNumbers.length;
    }

    function clearSelection() {
      selectedNumbers = [];
      allGridItems.forEach(i => i.classList.remove("selected"));
      selectedCountSpan.textContent = 0;
      resultDiv.innerHTML = "";
    }

    // Endpoint da Dupla Sena
    const API_URL = "https://loteriascaixa-api.herokuapp.com/api/duplasena";

    async function carregarHistorico() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error("Erro na API");

        const data = await res.json();

        const concursos = data.map(c => {
          // Converte todas as dezenas recebidas para números
          const todasDezenas = c.dezenas ? c.dezenas.map(n => parseInt(n)) : [];

          return {
            concurso: c.concurso,
            data: c.data,
            // O 1º sorteio pega os índices de 0 a 5 (os 6 primeiros números)
            dezenas1: todasDezenas.slice(0, 6),
            // O 2º sorteio pega os índices de 6 a 11 (os 6 últimos números)
            dezenas2: todasDezenas.slice(6, 12)
          };
        });

        localStorage.setItem("duplaSenaCache", JSON.stringify(concursos));
        return concursos;
      } catch (e) {
        console.warn("A usar cache local", e);
        const cache = localStorage.getItem("duplaSenaCache");
        return cache ? JSON.parse(cache) : [];
      }
    }

    async function checkResults() {
      if (selectedNumbers.length < 6 || selectedNumbers.length > 15) {
        alert("Selecione entre 6 e 15 números.");
        return;
      }

      resultDiv.innerHTML = "<p><em>A analisar os sorteios...</em></p>";
      const historico = await carregarHistorico();

      if (historico.length === 0) {
        alert("Não foi possível carregar os dados.");
        resultDiv.innerHTML = "";
        return;
      }

      let resSorteio1 = { terno: [], quadra: [], quina: [], sena: [] };
      let resSorteio2 = { terno: [], quadra: [], quina: [], sena: [] };

      historico.forEach(c => {
        // Checagem 1º Sorteio
        if (c.dezenas1.length > 0) {
          const acertos1 = c.dezenas1.filter(n => selectedNumbers.includes(n)).length;
          if (acertos1 === 3) resSorteio1.terno.push(c);
          if (acertos1 === 4) resSorteio1.quadra.push(c);
          if (acertos1 === 5) resSorteio1.quina.push(c);
          if (acertos1 === 6) resSorteio1.sena.push(c);
        }

        // Checagem 2º Sorteio
        if (c.dezenas2.length > 0) {
          const acertos2 = c.dezenas2.filter(n => selectedNumbers.includes(n)).length;
          if (acertos2 === 3) resSorteio2.terno.push(c);
          if (acertos2 === 4) resSorteio2.quadra.push(c);
          if (acertos2 === 5) resSorteio2.quina.push(c);
          if (acertos2 === 6) resSorteio2.sena.push(c);
        }
      });

      function listaResultados(lista) {
        if (lista.length === 0) return "<em>Nenhum</em>";
        return `<div class="result-list">${lista.map(c => `Concurso ${c.concurso} (${c.data})`).join("<br>")}</div>`;
      }

      const possuiSegundoSorteio = historico.some(c => c.dezenas2 && c.dezenas2.length > 0);

      resultDiv.innerHTML = `
        <div class="sorteio-section">
          <h3>1º Sorteio</h3>
          <p><strong>Terno (3):</strong> ${resSorteio1.terno.length} vezes</p>
          ${listaResultados(resSorteio1.terno)}

          <p><strong>Quadra (4):</strong> ${resSorteio1.quadra.length} vezes</p>
          ${listaResultados(resSorteio1.quadra)}

          <p><strong>Quina (5):</strong> ${resSorteio1.quina.length} vezes</p>
          ${listaResultados(resSorteio1.quina)}

          <p><strong>Sena (6):</strong> ${resSorteio1.sena.length} vezes</p>
          ${listaResultados(resSorteio1.sena)}
        </div>

        <div class="sorteio-section">
          <h3>2º Sorteio</h3>
          ${!possuiSegundoSorteio ? 
            "<p><em>Aviso: A API utilizada não enviou os dados referentes ao 2º sorteio.</em></p>" :
            `
            <p><strong>Terno (3):</strong> ${resSorteio2.terno.length} vezes</p>
            ${listaResultados(resSorteio2.terno)}

            <p><strong>Quadra (4):</strong> ${resSorteio2.quadra.length} vezes</p>
            ${listaResultados(resSorteio2.quadra)}

            <p><strong>Quina (5):</strong> ${resSorteio2.quina.length} vezes</p>
            ${listaResultados(resSorteio2.quina)}

            <p><strong>Sena (6):</strong> ${resSorteio2.sena.length} vezes</p>
            ${listaResultados(resSorteio2.sena)}
            `
          }
        </div>
      `;
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  </script>
</body>
</html>
